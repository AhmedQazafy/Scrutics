# Scrutics Classification Rules
# ─────────────────────────────
# Rules are evaluated in order. First match wins.
# Built-in rules apply after these if no match is found.
#
# Fields:
#   name        : Human-readable rule name (required)
#   port        : Destination port to match (optional)
#   protocol    : TCP or UDP (optional, defaults to any)
#   mac_prefix  : First 3 bytes of MAC e.g. "00:80:F4" (optional)
#   classify_as : Protocol label shown in output (required)
#   role        : Device role shown in output (required)
#   is_ot       : true/false (required)
#   confidence  : HIGH / MEDIUM / LOW (optional, defaults to HIGH)
#
# Example custom rules:
#
# rules:
#   - name: "Custom Historian"
#     port: 9999
#     protocol: TCP
#     classify_as: "OSIsoft PI Historian"
#     role: "Data Historian"
#     is_ot: true
#
#   - name: "Legacy RTU Fleet"
#     mac_prefix: "00:AB:CD"
#     classify_as: "Legacy RTU"
#     role: "Remote Terminal Unit"
#     is_ot: true

rules: []
